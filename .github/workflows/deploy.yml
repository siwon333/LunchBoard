name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: |
          python3 - <<'EOF'
          import os, pathlib
          f = pathlib.Path('web/index.html')
          html = f.read_text()
          html = html.replace('__FIREBASE_API_KEY__',      os.environ['FIREBASE_API_KEY'])
          html = html.replace('__FIREBASE_PROJECT_ID__',   os.environ['FIREBASE_PROJECT_ID'])
          html = html.replace('__FIREBASE_STORAGE_BUCKET__', os.environ['FIREBASE_STORAGE_BUCKET'])
          html = html.replace('__FIREBASE_APP_ID__',       os.environ['FIREBASE_APP_ID'])
          f.write_text(html)
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - uses: actions/deploy-pages@v4
        id: deployment
