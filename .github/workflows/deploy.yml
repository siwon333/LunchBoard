name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        run: |
          sed -i "s|__FIREBASE_API_KEY__|${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}|g" web/index.html
          sed -i "s|__FIREBASE_PROJECT_ID__|${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}|g" web/index.html
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}|g" web/index.html
          sed -i "s|__FIREBASE_APP_ID__|${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}|g" web/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - uses: actions/deploy-pages@v4
        id: deployment
