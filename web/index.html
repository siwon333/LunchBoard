<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 급식</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; }
    .header { background: #fff; padding: 24px 16px 16px; border-bottom: 1px solid #f3f4f6; position: relative; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .schedule-fab { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 5px; background: #0ea5e9; color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(14,165,233,0.35); }
    .schedule-fab:hover { background: #0284c7; }
    .card { margin: 16px; background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; padding: 16px; }
    .card h2 { font-size: 14px; font-weight: 700; color: #1f2937; margin-bottom: 12px; }
    .menu-item { background: #f9fafb; border-radius: 10px; padding: 10px 12px; margin-bottom: 4px; font-size: 14px; color: #1f2937; display: flex; align-items: center; gap: 8px; }
    .menu-item.favorite { background: #fef9c3; border: 1px solid #fde047; }
    .fav-btn { background: none; border: none; cursor: pointer; font-size: 17px; flex-shrink: 0; padding: 0; line-height: 1; color: #d1d5db; transition: color 0.15s; }
    .fav-btn.active { color: #ef4444; }
    .fav-btn:hover { color: #fca5a5; }
    .fav-btn.active:hover { color: #dc2626; }
    .menu-item-name { flex: 1; }
    .menu-hint { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 8px; }
    .menu-fav-notice { font-size: 11px; color: #ca8a04; text-align: center; margin-top: 8px; }

    /* 날짜 네비게이션 */
    .date-nav { display: flex; align-items: center; gap: 4px; margin-top: 8px; }
    .date-nav-btn { background: none; border: 1px solid #e5e7eb; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; font-weight: 700; color: #6b7280; flex-shrink: 0; line-height: 1; }
    .date-nav-btn:hover { background: #f3f4f6; border-color: #d1d5db; }
    .date-display-btn { flex: 1; background: none; border: none; cursor: pointer; font-size: 12px; color: #9ca3af; text-align: center; padding: 2px 4px; }
    .date-display-btn:hover { color: #0ea5e9; }
    .today-back-btn { font-size: 11px; color: #0ea5e9; background: none; border: none; cursor: pointer; padding: 2px 0; margin-top: 2px; }
    .today-back-btn:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 32px 0; }
    .empty .emoji { font-size: 32px; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #9ca3af; }
    .tabs { display: flex; border-bottom: 1px solid #e5e7eb; background: #fff; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 500; color: #6b7280; border: none; background: none; cursor: pointer; }
    .tab.active { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }

    /* PIN */
    .pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 32px; }
    .pin-screen .emoji { font-size: 40px; margin-bottom: 8px; }
    .pin-screen h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .pin-screen p { font-size: 13px; color: #9ca3af; margin-bottom: 24px; }

    /* Inputs */
    input[type="password"], input[type="text"], input[type="date"], input[type="month"], textarea {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 12px; font-size: 14px; outline: none; background: #f9fafb; color: #111827;
    }
    input[type="password"] { text-align: center; font-size: 20px; letter-spacing: 8px; margin-bottom: 12px; }
    input[type="file"] { width: 100%; font-size: 13px; color: #6b7280; margin-top: 4px; }
    textarea { min-height: 140px; resize: vertical; font-family: inherit; }
    label { font-size: 12px; color: #6b7280; margin-bottom: 4px; display: block; margin-top: 12px; }

    /* Buttons */
    .btn { display: block; width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-primary:disabled { background: #bae6fd; cursor: default; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-success:disabled { background: #a7f3d0; cursor: default; }
    .btn-amber { background: #f59e0b; color: #fff; }
    .btn-lock { background: #f3f4f6; color: #6b7280; font-size: 12px; padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; }

    /* Admin header */
    .admin-header { display: flex; align-items: flex-end; justify-content: space-between; background: #fff; padding: 24px 16px 16px; border-bottom: 1px solid #f3f4f6; }

    /* Step indicator */
    .step-label { font-size: 11px; font-weight: 700; color: #0ea5e9; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    /* Monthly paste */
    .paste-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .paste-row input { flex: 1; }
    .paste-row button { white-space: nowrap; padding: 0 16px; border-radius: 12px; background: #f59e0b; color: #fff; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    #raw-input { min-height: 160px; background: #fffbeb; border-color: #fbbf24; }

    /* Day button grid */
    .day-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .day-btn { padding: 8px 14px; border-radius: 10px; border: 1.5px solid #e5e7eb; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #374151; }
    .day-btn:hover { border-color: #0ea5e9; color: #0ea5e9; }
    .day-btn.selected { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
    .day-btn.saved { border-color: #10b981; color: #10b981; }
    .day-btn.saved.selected { background: #10b981; color: #fff; border-color: #10b981; }

    /* Divider */
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 16px 0; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 32px 0; color: #9ca3af; font-size: 14px; }

    /* Admin footer link */
    .admin-footer { text-align: center; padding: 24px 16px 40px; }
    .admin-link { font-size: 11px; color: #d1d5db; background: none; border: none; cursor: pointer; text-decoration: none; }
    .admin-link:hover { color: #9ca3af; }

    /* Save all progress */
    .progress-bar { height: 4px; background: #e5e7eb; border-radius: 2px; margin: 8px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 2px; transition: width 0.3s; }

    /* Notice cards */
    .notice-card { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; margin: 16px; overflow: hidden; }
    .notice-card img { width: 100%; display: block; max-height: 320px; object-fit: cover; }
    .notice-body { padding: 14px 16px 16px; }
    .notice-text { font-size: 14px; color: #1f2937; white-space: pre-wrap; line-height: 1.6; }
    .notice-date { font-size: 11px; color: #9ca3af; margin-top: 8px; }
    .notice-delete { float: right; font-size: 11px; color: #ef4444; background: none; border: none; cursor: pointer; margin-top: 2px; }

    /* Image upload preview */
    #notice-img-preview { width: 100%; border-radius: 12px; margin-top: 10px; display: none; max-height: 200px; object-fit: cover; }
    .upload-progress { height: 4px; background: #e5e7eb; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
    .upload-progress-fill { height: 100%; background: #0ea5e9; border-radius: 2px; transition: width 0.2s; }

    /* Notice engagement */
    .notice-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f3f4f6; }
    .action-btn { display: inline-flex; align-items: center; gap: 4px; background: #f9fafb; border: 1px solid #e5e7eb; cursor: pointer; font-size: 13px; color: #6b7280; padding: 5px 12px; border-radius: 20px; transition: all 0.15s; }
    .action-btn:hover { background: #f3f4f6; border-color: #d1d5db; }
    .action-btn.liked { color: #ef4444; border-color: #fca5a5; background: #fff1f2; }

    /* Comments */
    .comment-section { border-top: 1px solid #f3f4f6; background: #f9fafb; padding: 12px 16px 14px; }
    .comment-empty { text-align: center; padding: 12px 0 8px; font-size: 13px; color: #9ca3af; }
    .comment-item { padding: 8px 0; font-size: 13px; color: #1f2937; line-height: 1.5; }
    .comment-item + .comment-item { border-top: 1px solid #f3f4f6; }
    .comment-time { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input-row input[type="text"] { flex: 1; padding: 8px 14px; border: 1px solid #e5e7eb; border-radius: 20px; font-size: 13px; outline: none; background: #fff; width: auto; }
    .comment-input-row input[type="text"]:focus { border-color: #0ea5e9; }
    .comment-submit { padding: 8px 14px; border-radius: 20px; background: #0ea5e9; color: #fff; border: none; font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 500; flex-shrink: 0; }
    .comment-submit:hover { background: #0284c7; }
    .comment-delete { font-size: 11px; color: #ef4444; background: none; border: none; cursor: pointer; padding: 2px 4px; float: right; }

    /* 시간표 */
    .schedule-header { background: #fff; padding: 16px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 10px; }
    .back-btn { background: none; border: 1px solid #e5e7eb; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: #6b7280; flex-shrink: 0; }
    .back-btn:hover { background: #f3f4f6; }
    .friend-view-badge { font-size: 11px; color: #0ea5e9; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px; padding: 2px 10px; }
    .timetable-wrap { overflow-x: auto; padding: 12px 16px 8px; position: relative; }
    .time-indicator { position: absolute; left: 16px; right: 16px; height: 2px; background: #ef4444; pointer-events: none; z-index: 5; transition: top 0.5s linear; }
    .time-indicator::before { content: attr(data-time); position: absolute; left: 0; top: 50%; transform: translate(-100%, -50%); background: #ef4444; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 8px; white-space: nowrap; margin-left: -2px; }
    .timetable { width: 100%; border-collapse: collapse; }
    .timetable th { background: #f9fafb; font-size: 12px; font-weight: 600; color: #6b7280; padding: 8px 4px; text-align: center; border: 1px solid #e5e7eb; }
    .timetable td { border: 1px solid #e5e7eb; vertical-align: middle; }
    .timetable .period-cell { background: #f9fafb; font-size: 11px; color: #9ca3af; text-align: center; font-weight: 600; padding: 6px 4px; white-space: nowrap; line-height: 1.6; }
    .timetable .period-time { display: block; font-size: 9px; font-weight: 400; color: #c4c9d4; margin-top: 1px; }
    .timetable .subject-cell { text-align: center; font-size: 12px; font-weight: 600; height: 44px; padding: 3px; }
    .timetable .subject-cell.editable { cursor: pointer; }
    .timetable .subject-cell.editable:hover { filter: brightness(0.94); }
    .timetable .subject-cell:not(.has-value) { color: #d1d5db; font-weight: 400; }
    .timetable .subject-cell.grade-1 { background: #dbeafe; color: #1d4ed8; }
    .timetable .subject-cell.grade-2 { background: #dcfce7; color: #15803d; }
    .timetable .subject-cell.grade-3 { background: #fce7f3; color: #be185d; }
    .timetable .lunch-row td { background: #fffbeb; border-color: #fde68a; color: #92400e; font-size: 12px; font-weight: 600; text-align: center; padding: 12px 4px; }
    .timetable .subject-cell .subj-label { display: inline-flex; align-items: center; justify-content: center; width: 100%; height: 100%; border-radius: 6px; padding: 2px 4px; font-size: 12px; font-weight: 600; }
    .timetable .subject-cell input { width: 100%; border: none; outline: none; background: #eff6ff; text-align: center; font-size: 12px; padding: 2px; font-family: inherit; height: 100%; border-radius: 6px; }
  </style>
</head>
<body>

<div class="tabs" id="main-tabs">
  <button class="tab active" onclick="showTab('meal')">오늘의 급식</button>
  <button class="tab" onclick="showTab('notice')">오늘의 ???</button>
</div>

<!-- 급식 탭 -->
<div id="tab-meal">
  <div class="header">
    <button class="schedule-fab" onclick="showSchedule()">📅 시간표</button>
    <h1 id="meal-title">오늘의 급식</h1>
    <div class="date-nav">
      <button class="date-nav-btn" onclick="navigateDate(-1)">‹</button>
      <button class="date-display-btn" id="date-display" onclick="openDatePicker()"></button>
      <input type="date" id="date-picker" onchange="onDatePickerChange(this.value)"
        style="position:absolute;width:0;height:0;opacity:0;pointer-events:none" />
      <button class="date-nav-btn" onclick="navigateDate(1)">›</button>
    </div>
    <button class="today-back-btn" id="today-back-btn" onclick="goToToday()" style="display:none">오늘로 돌아가기 →</button>
  </div>
  <div class="card">
    <h2>메뉴</h2>
    <div id="menu-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- 쌉소리 탭 -->
<div id="tab-notice" style="display:none">
  <div class="header">
    <h1>오늘의 ???</h1>
    <p id="notice-label"></p>
  </div>
  <!-- 쌉소리 등록 (누구나) -->
  <div class="card">
    <div class="step-label">등록</div>
    <label>내용</label>
    <textarea id="notice-text-input" style="min-height:100px" placeholder="내용을 입력하세요"></textarea>
    <label>이미지 (선택)</label>
    <input type="file" id="notice-img-input" accept="image/*" onchange="previewNoticeImg(this)" />
    <img id="notice-img-preview" alt="미리보기" />
    <div class="upload-progress" id="upload-progress"><div class="upload-progress-fill" id="upload-progress-fill" style="width:0%"></div></div>
    <br/>
    <button class="btn btn-primary" id="notice-post-btn" onclick="postNotice()">등록</button>
  </div>
  <div id="notice-list"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 관리자 탭 -->
<div id="tab-admin" style="display:none">
  <div id="pin-view">
    <div class="pin-screen">
      <div class="emoji">🔒</div>
      <h2>관리자 전용</h2>
      <p>PIN을 입력하세요</p>
      <form onsubmit="checkPin();return false;">
        <input type="password" id="pin-input" maxlength="8" placeholder="PIN" />
        <button type="submit" class="btn btn-primary">입장</button>
      </form>
    </div>
  </div>

  <div id="admin-view" style="display:none">
    <div class="admin-header">
      <div>
        <h1 style="font-size:20px;font-weight:700">관리자</h1>
        <p style="font-size:12px;color:#9ca3af;margin-top:2px">급식 메뉴를 등록해요</p>
      </div>
      <button class="btn-lock" onclick="lockAdmin()">잠금</button>
    </div>

    <!-- STEP 1: 월간 붙여넣기 -->
    <div class="card">
      <div class="step-label">Step 1 — 월간 급식표 붙여넣기</div>
      <div class="paste-row">
        <input type="month" id="raw-month" />
        <button onclick="parseMonthly()">✨ 분석</button>
      </div>
      <textarea id="raw-input" placeholder="date,menu 형식의 CSV를 붙여넣으세요.&#10;&#10;date,menu&#10;3,현미밥|사골순대국|콩나물무침|목살스테이크&#10;4,미니밥|베트남쌀국수|배추김치&#10;5,친환경흰쌀밥|황태콩나물국|계란찜"></textarea>
    </div>

    <!-- STEP 2: 날짜 선택 (분석 후 표시) -->
    <div class="card" id="step2" style="display:none">
      <div class="step-label">Step 2 — 날짜 선택</div>
      <div class="day-grid" id="day-grid"></div>
      <hr class="divider" />
      <button class="btn btn-success" id="save-all-btn" onclick="saveAll()">📅 전체 저장 (모든 날짜 한 번에)</button>
      <div class="progress-bar" id="progress-bar" style="display:none"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <!-- STEP 3: 선택한 날 확인·수정 후 저장 -->
    <div class="card" id="step3" style="display:none">
      <div class="step-label">Step 3 — 확인 및 저장</div>
      <label>날짜</label>
      <input type="date" id="menu-date" />
      <label>메뉴 (한 줄에 하나씩, 수정 가능)</label>
      <textarea id="menu-input" placeholder="메뉴 항목"></textarea>
      <br/>
      <button class="btn btn-primary" id="save-btn" onclick="saveOne()">저장</button>
    </div>
  </div>
</div>

<!-- 시간표 탭 -->
<div id="tab-schedule" style="display:none">
  <div class="schedule-header">
    <button class="back-btn" onclick="hideSchedule()">← 돌아가기</button>
    <span style="font-size:16px;font-weight:700">수학 시간표</span>
  </div>
  <div class="timetable-wrap">
    <div id="time-indicator" class="time-indicator" style="display:none" data-time=""></div>
    <table class="timetable">
      <thead>
        <tr>
          <th style="width:54px"></th>
          <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
        </tr>
      </thead>
      <tbody id="timetable-body"></tbody>
    </table>
  </div>
</div>

<!-- 관리자 진입 (하단 숨김 링크) -->
<div id="main-footer" class="admin-footer">
  <button class="admin-link" onclick="showAdmin()">관리자</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, updateDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove, increment }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
  import { getStorage, ref, uploadBytesResumable, getDownloadURL }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';

  const firebaseConfig = {
    apiKey: '__FIREBASE_API_KEY__',
    authDomain: '__FIREBASE_PROJECT_ID__.firebaseapp.com',
    projectId: '__FIREBASE_PROJECT_ID__',
    storageBucket: '__FIREBASE_STORAGE_BUCKET__',
    appId: '__FIREBASE_APP_ID__',
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const ADMIN_PIN = '1234';

  function getAnonymousId() {
    let id = localStorage.getItem('lb_uid');
    if (!id) {
      id = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      localStorage.setItem('lb_uid', id);
    }
    return id;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function koreanDate(s) {
    const [y, m, day] = s.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
  }
  function formatTs(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  const today = todayStr();
  document.getElementById('notice-label').textContent = koreanDate(today);
  document.getElementById('raw-month').value = today.slice(0, 7);

  // ─── 개인 즐겨찾기 ───────────────────────────────────────
  let myFavorites = JSON.parse(localStorage.getItem('lb_favorites') || '[]');
  let currentItems = [];
  let menuUnsub = null;
  let selectedDate = today;

  function koreanDateFull(s) {
    const days = ['일','월','화','수','목','금','토'];
    const [y, m, day] = s.split('-');
    const d = new Date(s + 'T00:00:00');
    return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일 (${days[d.getDay()]})`;
  }

  function updateDateDisplay() {
    document.getElementById('date-display').textContent = koreanDateFull(selectedDate) + ' 📅';
    document.getElementById('date-picker').value = selectedDate;
    const isToday = selectedDate === today;

  // ─── 시간표 ────────────────────────────────────────────
  const TIMETABLE_PERIODS = 7;
  const TIMETABLE_DAYS = 5;
  // 교시별 시작·끝 시각 (분 단위, 자정 기준) — 실제 시정표 기준
  const PERIOD_MINUTES = [
    [9*60+10,  9*60+55],    // 1교시  09:10~09:55
    [10*60+5,  10*60+50],   // 2교시  10:05~10:50
    [11*60,    11*60+45],   // 3교시  11:00~11:45
    [11*60+55, 12*60+40],   // 4교시  11:55~12:40
    [13*60+20, 14*60+5],    // 5교시  13:20~14:05
    [14*60+15, 15*60],      // 6교시  14:15~15:00
    [15*60+10, 15*60+55],   // 7교시  15:10~15:55

  ];
  let timeIndicatorTimer = null;

  function updateTimeIndicator() {
    const indicator = document.getElementById('time-indicator');
    const tbody = document.getElementById('timetable-body');
    if (!indicator || !tbody) return;

    const now = new Date();
    const hm = now.getHours() * 60 + now.getMinutes();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const [firstStart] = PERIOD_MINUTES[0];
    const [, lastEnd] = PERIOD_MINUTES[PERIOD_MINUTES.length - 1];

    if (hm < firstStart || hm > lastEnd) {
      indicator.style.display = 'none';
      return;
    }

    const table = tbody.closest('table');
    const thead = table ? table.querySelector('thead') : null;
    const theadH = thead ? thead.offsetHeight : 0;

    let topPx = null;
    for (let i = 0; i < PERIOD_MINUTES.length; i++) {
      const [start, end] = PERIOD_MINUTES[i];
      const row = tbody.querySelector(`[data-period="${i}"]`);
      if (!row) break;
      const rowTop = theadH + row.offsetTop;
      const rowH = row.offsetHeight;

      if (hm >= start && hm <= end) {
        topPx = rowTop + ((hm - start) / (end - start)) * rowH;
        break;
      } else if (i < PERIOD_MINUTES.length - 1 && hm > end && hm < PERIOD_MINUTES[i + 1][0]) {
        const nextRow = tbody.querySelector(`[data-period="${i + 1}"]`);
        const nextTop = nextRow ? theadH + nextRow.offsetTop : rowTop + rowH;
        topPx = (rowTop + rowH) + ((hm - end) / (PERIOD_MINUTES[i + 1][0] - end)) * (nextTop - rowTop - rowH);
        break;
      }
    }

    if (topPx !== null) {
      indicator.style.display = '';
      indicator.style.top = topPx + 'px';
      indicator.setAttribute('data-time', timeStr);
    } else {
      indicator.style.display = 'none';
    }
  }

  // 고정 시간표 데이터 (수정 불가)
  const FIXED_SCHEDULE = {
    d0p0: '1학년', // 월 1교시
    d1p5: '1학년', // 화 6교시
    d3p4: '1학년', // 목 5교시
    d4p1: '1학년', // 금 2교시
    d0p3: '2학년', // 월 4교시
    d1p4: '2학년', // 화 5교시
    d3p1: '2학년', // 목 2교시
    d4p4: '2학년', // 금 5교시
    d0p1: '3학년', // 월 2교시
    d3p6: '3학년', // 목 7교시
    d4p5: '3학년', // 금 6교시
  };

  function renderTimetable() {
    const tbody = document.getElementById('timetable-body');
    tbody.innerHTML = '';
    for (let p = 0; p < TIMETABLE_PERIODS; p++) {
      const tr = document.createElement('tr');
      tr.dataset.period = p;
      const periodTd = document.createElement('td');
      periodTd.className = 'period-cell';
      const [ps, pe] = PERIOD_MINUTES[p];
      const fmt = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
      periodTd.innerHTML = `${p + 1}교시<span class="period-time">${fmt(ps)}~${fmt(pe)}</span>`;
      tr.appendChild(periodTd);
      for (let d = 0; d < TIMETABLE_DAYS; d++) {
        const val = FIXED_SCHEDULE[`d${d}p${p}`] || '';
        const td = document.createElement('td');
        const gradeClass = val === '1학년' ? ' grade-1' : val === '2학년' ? ' grade-2' : val === '3학년' ? ' grade-3' : '';
        td.className = 'subject-cell' + (val ? ' has-value' : '') + gradeClass;
        td.textContent = val;
        tr.appendChild(td);
      }
      tbody.appendChild(tr);

      // 4교시(p=3) 다음에 점심 행 삽입
      if (p === 3) {
        const lunchTr = document.createElement('tr');
        lunchTr.className = 'lunch-row';
        lunchTr.dataset.lunch = 'true';
        const lunchTd = document.createElement('td');
        lunchTd.colSpan = 6;
        lunchTd.textContent = '🍱 점심  12:40 ~ 13:20';
        lunchTr.appendChild(lunchTd);
        tbody.appendChild(lunchTr);
      }
    }
  }

  window.showSchedule = () => {
    document.getElementById('tab-meal').style.display = 'none';
    document.getElementById('tab-notice').style.display = 'none';
    document.getElementById('main-tabs').style.display = 'none';
    document.getElementById('main-footer').style.display = 'none';
    document.getElementById('tab-schedule').style.display = '';

    renderTimetable();

    clearInterval(timeIndicatorTimer);
    setTimeout(updateTimeIndicator, 100);
    timeIndicatorTimer = setInterval(updateTimeIndicator, 60 * 1000);
  };

  window.hideSchedule = () => {
    clearInterval(timeIndicatorTimer);
    timeIndicatorTimer = null;
    document.getElementById('tab-schedule').style.display = 'none';
    document.getElementById('main-tabs').style.display = '';
    document.getElementById('tab-meal').style.display = '';
    document.getElementById('main-footer').style.display = '';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
