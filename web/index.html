<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 급식</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; }
    .header { background: #fff; padding: 24px 16px 16px; border-bottom: 1px solid #f3f4f6; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .card { margin: 16px; background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; padding: 16px; }
    .card h2 { font-size: 14px; font-weight: 700; color: #1f2937; margin-bottom: 12px; }
    .menu-item { background: #f9fafb; border-radius: 10px; padding: 10px 12px; margin-bottom: 4px; font-size: 14px; color: #1f2937; }
    .empty { text-align: center; padding: 32px 0; }
    .empty .emoji { font-size: 32px; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #9ca3af; }
    .tabs { display: flex; border-bottom: 1px solid #e5e7eb; background: #fff; }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 500; color: #6b7280; border: none; background: none; cursor: pointer; }
    .tab.active { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }

    /* 관리자 */
    .pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 32px; }
    .pin-screen .emoji { font-size: 40px; margin-bottom: 8px; }
    .pin-screen h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .pin-screen p { font-size: 13px; color: #9ca3af; margin-bottom: 24px; }
    input[type="password"], input[type="text"], input[type="date"], textarea {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 12px; font-size: 14px; outline: none; background: #f9fafb; color: #111827;
    }
    input[type="password"] { text-align: center; font-size: 20px; letter-spacing: 8px; margin-bottom: 12px; }
    textarea { min-height: 180px; resize: vertical; font-family: inherit; }
    label { font-size: 12px; color: #6b7280; margin-bottom: 4px; display: block; margin-top: 12px; }
    .btn { display: block; width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0ea5e9; color: #fff; margin-top: 0; }
    .btn-primary:disabled { background: #bae6fd; cursor: default; }
    .btn-lock { background: #f3f4f6; color: #6b7280; font-size: 12px; padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; }
    .admin-header { display: flex; align-items: flex-end; justify-content: space-between; background: #fff; padding: 24px 16px 16px; border-bottom: 1px solid #f3f4f6; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 32px 0; color: #9ca3af; font-size: 14px; }
    .paste-area { background: #fffbeb; border: 1px dashed #fbbf24; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .paste-area textarea { background: #fffbeb; border: none; min-height: 120px; }
    .btn-parse { background: #f59e0b; color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; width: 100%; }
    .section-divider { display: flex; align-items: center; gap: 8px; margin: 14px 0 10px; }
    .section-divider span { font-size: 11px; color: #9ca3af; white-space: nowrap; }
    .section-divider hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; }
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('meal')">오늘의 급식</button>
  <button class="tab" onclick="showTab('admin')">관리자</button>
</div>

<!-- 급식 탭 -->
<div id="tab-meal">
  <div class="header">
    <h1>오늘의 급식</h1>
    <p id="today-label"></p>
  </div>
  <div class="card">
    <h2>오늘의 메뉴</h2>
    <div id="menu-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- 관리자 탭 -->
<div id="tab-admin" style="display:none">
  <div id="pin-view">
    <div class="pin-screen">
      <div class="emoji">🔒</div>
      <h2>관리자 전용</h2>
      <p>PIN을 입력하세요</p>
      <input type="password" id="pin-input" maxlength="8" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPin()" />
      <button class="btn btn-primary" onclick="checkPin()">입장</button>
    </div>
  </div>
  <div id="admin-view" style="display:none">
    <div class="admin-header">
      <div>
        <h1 style="font-size:20px;font-weight:700">관리자</h1>
        <p style="font-size:12px;color:#9ca3af;margin-top:2px">급식 메뉴를 등록해요</p>
      </div>
      <button class="btn-lock" onclick="lockAdmin()">잠금</button>
    </div>
    <div class="card">
      <h2>📝 메뉴 입력</h2>
      <label>날짜</label>
      <input type="date" id="menu-date" />

      <div class="section-divider"><hr/><span>HWP·PDF에서 복사한 텍스트 붙여넣기</span><hr/></div>
      <div class="paste-area">
        <textarea id="raw-input" placeholder="급식표에서 복사한 내용을 그대로 붙여넣으세요&#10;&#10;예)&#10;1. 흑미밥 (1.5)&#10;2. 된장국 300kcal&#10;3. 돼지불고기 (1.2.5)&#10;4. 깍두기&#10;5. 사과"></textarea>
        <button class="btn-parse" onclick="parseRaw()">✨ 자동 정리</button>
      </div>

      <div class="section-divider"><hr/><span>또는 직접 입력 (한 줄에 하나씩)</span><hr/></div>
      <textarea id="menu-input" placeholder="흑미밥&#10;된장국&#10;돼지불고기&#10;깍두기&#10;사과"></textarea>
      <br/><br/>
      <button class="btn btn-primary" id="save-btn" onclick="saveMenu()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: '__FIREBASE_API_KEY__',
    authDomain: '__FIREBASE_PROJECT_ID__.firebaseapp.com',
    projectId: '__FIREBASE_PROJECT_ID__',
    storageBucket: '__FIREBASE_STORAGE_BUCKET__',
    appId: '__FIREBASE_APP_ID__',
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const ADMIN_PIN = '1234';

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function koreanDate(s) {
    const [y, m, day] = s.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
  }

  // 날짜 라벨
  const today = todayStr();
  document.getElementById('today-label').textContent = koreanDate(today);
  document.getElementById('menu-date').value = today;

  // 메뉴 실시간 구독
  onSnapshot(doc(db, 'mealMenus', today), (snap) => {
    const list = document.getElementById('menu-list');
    if (snap.exists() && snap.data().items.length > 0) {
      list.innerHTML = snap.data().items.map(item =>
        `<div class="menu-item">${item}</div>`
      ).join('');
    } else {
      list.innerHTML = `<div class="empty"><div class="emoji">🍱</div><p>오늘 메뉴가 아직 등록되지 않았어요</p></div>`;
    }
  });

  // 탭 전환
  window.showTab = (tab) => {
    document.getElementById('tab-meal').style.display = tab === 'meal' ? '' : 'none';
    document.getElementById('tab-admin').style.display = tab === 'admin' ? '' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0) === (tab==='meal')));
  };

  // PIN
  window.checkPin = () => {
    const pin = document.getElementById('pin-input').value;
    if (pin === ADMIN_PIN) {
      document.getElementById('pin-view').style.display = 'none';
      document.getElementById('admin-view').style.display = '';
    } else {
      showToast('PIN이 틀렸습니다');
      document.getElementById('pin-input').value = '';
    }
  };

  window.lockAdmin = () => {
    document.getElementById('admin-view').style.display = 'none';
    document.getElementById('pin-view').style.display = '';
    document.getElementById('pin-input').value = '';
  };

  // 글 뭉치 자동 파싱
  window.parseRaw = () => {
    const raw = document.getElementById('raw-input').value;
    if (!raw.trim()) { showToast('텍스트를 먼저 붙여넣으세요'); return; }

    const SKIP_WORDS = ['날짜','요일','에너지','단백질','지방','탄수화물','칼슘','철분','비타민','나트륨','식단','급식','메뉴','합계','총계','영양','원산지','학교','공지'];

    const items = raw
      // 쉼표·슬래시를 줄바꿈으로
      .replace(/[,，、/／]+/g, '\n')
      .split('\n')
      .map(line => line
        // 앞의 번호·기호 제거: "1.", "①", "1)", "•", "-", "※" 등
        .replace(/^[\s\d①-⑳㉑-㊿\.\)\-•※◦▶▷·◆★☆▪▫\[\]【】]+/, '')
        // 칼로리 제거: "(300kcal)", "300 kcal"
        .replace(/[\(（]\s*\d+[\s]*[kK][cC][aA][lL]\s*[\)）]/g, '')
        .replace(/\d+[\s]*[kK][cC][aA][lL]/g, '')
        // 알레르기 코드 제거: "(1.2.5)", "[1,5,6]"
        .replace(/[\(（\[【]\s*[\d\.\,\s]+[\)\)）\]】]/g, '')
        // 남은 괄호 내용 제거
        .replace(/[\(（][^)）]{0,20}[\)）]/g, '')
        .trim()
      )
      .filter(line => {
        if (!line || line.length < 2 || line.length > 25) return false;
        if (!/[가-힣]/.test(line)) return false; // 한글 없으면 제외
        if (SKIP_WORDS.some(w => line.includes(w))) return false;
        return true;
      });

    if (!items.length) { showToast('메뉴 항목을 찾지 못했어요. 텍스트를 확인해보세요'); return; }

    document.getElementById('menu-input').value = items.join('\n');
    document.getElementById('raw-input').value = '';
    showToast(`${items.length}개 항목이 정리됐어요 ✓`);
  };

  // 메뉴 저장
  window.saveMenu = async () => {
    const date = document.getElementById('menu-date').value;
    const items = document.getElementById('menu-input').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if (!items.length) { showToast('메뉴를 입력해주세요'); return; }
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '저장 중...';
    try {
      await setDoc(doc(db, 'mealMenus', date), { date, items });
      showToast(`${date} 메뉴가 저장됐어요`);
      document.getElementById('menu-input').value = '';
    } catch {
      showToast('저장에 실패했어요');
    } finally {
      btn.disabled = false; btn.textContent = '저장';
    }
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
